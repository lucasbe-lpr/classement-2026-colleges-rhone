h1 { font-size: 24px; margin-bottom: 1rem; line-height: 1.4; }
.search-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }

.nom { font-weight: bold; text-transform: uppercase; font-size: 0.95rem; }
.statut, .ville { font-size: 0.85rem; color: #666; }
.note { font-weight: bold; font-size: 0.95rem; white-space: nowrap; flex-shrink: 0; }
.bouton-plus {
  width: 32px; height: 32px; border: none; border-radius: 50%;
  background-color: #0068B1; color: white; font-size: 1.2rem;
  cursor: pointer; flex-shrink: 0; transition: background-color 0.2s ease;
}
.bouton-plus:hover { background-color: #00528c; }
.details {
  display: none; padding: 12px 56px;
  background-color: #f9f9f9; font-size: 0.9rem; color: #444;
  border-bottom: 1px solid #e0e0e0;

.detail-item { margin-bottom: 6px; position: relative; padding-left: 16px; }
.detail-item::before { content: '•'; position: absolute; left: 0; top: 0; color: #0068B1; font-size: 1.2rem; line-height: 1; }
.detail-item .label { font-weight: 600; }
.note-partielle { color: #888; font-size: 0.85rem; margin-left: 8px; }
/* Pagination */
#pagination {

#pagination button {

#pagination button:hover { background: #f0f0f0; }
#pagination button.active { background: #0068B1; color: #fff; border-color: #0068B1; font-weight: bold; }
#pagination button:disabled { opacity: 0.4; cursor: default; }
#result-info { font-size: 0.85rem; color: #666; margin-bottom: 8px; }
@media (max-width: 600px) {

  .details { padding: 12px 16px; }
}

var PER_PAGE = 5;
var currentPage = 1;
var allItems = [];

function majusculesSansAccents(t) {
  return t.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/-/g," ").toUpperCase();
}

function debounce(fn, delay) {
  var timer = null;
  return function() { clearTimeout(timer); timer = setTimeout(fn, delay); };
}

function renderPage(items, page) {
  var start = (page - 1) * PER_PAGE;
  var end = Math.min(start + PER_PAGE, items.length);
  var html = "";
  for (var i = start; i < end; i++) { html += items[i]; }
  $("#liste_etablissements").html(html);
  $(".bouton-plus").off("click").on("click", function() {
    var id = $(this).attr("data-id");
    $(".details."+id).toggle();
  });
  // Scroll top
  window.scrollTo(0, 0);
}

function renderPagination(items, page) {
  var total = items.length;
  var totalPages = Math.ceil(total / PER_PAGE);
  var html = "";

  // Info
  var start = (page-1)*PER_PAGE+1;
  var end = Math.min(page*PER_PAGE, total);
  $("#result-info").text(total > 0 ? "Affichage " + start + "-" + end + " sur " + total + " établissements" : "Aucun résultat");

  if (totalPages <= 1) { $("#pagination").html(""); return; }

  html += '<button id="btn-prev" ' + (page===1?"disabled":"") + '>&laquo;</button>';

  // Page buttons — show up to 7
  var startP = Math.max(1, page - 3);
  var endP = Math.min(totalPages, startP + 2);
  if (endP - startP < 2) startP = Math.max(1, endP - 2);

  if (startP > 1) { html += '<button data-p="1">1</button>'; if (startP > 2) html += '<span style="padding:0 4px">…</span>'; }
  for (var p = startP; p <= endP; p++) {
    html += '<button data-p="'+p+'" class="'+(p===page?"active":"")+'">' + p + '</button>';
  }
  if (endP < totalPages) { if (endP < totalPages - 1) html += '<span style="padding:0 4px">…</span>'; html += '<button data-p="'+totalPages+'">'+totalPages+'</button>'; }

  html += '<button id="btn-next" ' + (page===totalPages?"disabled":"") + '>&raquo;</button>';
  $("#pagination").html(html);

  $("#btn-prev").on("click", function() { if (currentPage > 1) { currentPage--; renderPage(allItems, currentPage); renderPagination(allItems, currentPage); }});
  $("#btn-next").on("click", function() { if (currentPage < totalPages) { currentPage++; renderPage(allItems, currentPage); renderPagination(allItems, currentPage); }});
  $("[data-p]").on("click", function() { currentPage = parseInt($(this).attr("data-p")); renderPage(allItems, currentPage); renderPagination(allItems, currentPage); });
}

function applyFilter(search) {
  var s = majusculesSansAccents(search.trim());
  var filtered = s === "" ? allItems : allItems.filter(function(html) {
    var tmp = $("<div>").html(html);
    var nom = majusculesSansAccents(tmp.find(".nom").text());
    var ville = majusculesSansAccents(tmp.find(".ville").text());
    return nom.indexOf(s) > -1 || ville.indexOf(s) > -1;
  });
  currentPage = 1;
  renderPage(filtered, 1);
  renderPagination(filtered, 1);
  // Store filtered for pagination
  allItems = filtered;
}

var searchDebounce = debounce(function() {
  // Reset to full list first
  allItems = window._allItemsFull.slice();
  var val = $("#searchInput").val();
  applyFilter(val);
  allItems = window._allItemsFull.slice(); // keep full for next search
  var s = majusculesSansAccents(val.trim());
  var filtered = s === "" ? allItems : allItems.filter(function(html) {
    var tmp = $("<div>").html(html);
    var nom = majusculesSansAccents(tmp.find(".nom").text());
    var ville = majusculesSansAccents(tmp.find(".ville").text());
    return nom.indexOf(s) > -1 || ville.indexOf(s) > -1;
  });
  allItems = filtered;
  currentPage = 1;
  renderPage(allItems, 1);
  renderPagination(allItems, 1);
}, 300);

$(function() {
  allItems = window._allItemsFull.slice();
  renderPage(allItems, 1);
  renderPagination(allItems, 1);
  $("#searchInput").on("input", searchDebounce);
});

  </script>
  <script>
function envoyerHauteur() {
  var hauteur = document.body.scrollHeight;
  parent.postMessage({ hauteur: hauteur }, "*");
}
window.addEventListener("load", envoyerHauteur);
var observer = new ResizeObserver(envoyerHauteur);
observer.observe(document.body);
</script>
